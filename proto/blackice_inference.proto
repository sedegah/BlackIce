syntax = "proto3";

package blackice.ipc.v1;

option go_package = "blackice/core/ipc/pb;pb";

message WindowFeatures {
  uint64 window_id = 1;
  uint64 pps = 2;
  uint64 bps = 3;
  double src_ip_entropy = 4;
  double dst_port_entropy = 5;
  double syn_ack_ratio = 6;
  double flow_churn = 7;
}

message InferenceResult {
  uint64 window_id = 1;
  double anomaly_score = 2;
}
